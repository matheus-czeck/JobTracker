<p-confirmDialog></p-confirmDialog>
<div class="list-container">
  <div class="header-container">
    <h2>Minhas Candidaturas</h2>
    <button pButton (click)="displayDialog = true" label="Nova Vaga"></button>

    <p-dialog
      header="Cadastrar Vaga"
      [(visible)]="displayDialog"
      [modal]="true"
      [style]="{ width: '400px' }"
    >
      <app-job-form (jobCreated)="onJobCreated()"></app-job-form>
    </p-dialog>
  </div>

  <p-table [value]="jobs" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>Empresa</th>
        <th>Título</th>
        <th>Status</th>
        <th style="width: 10%">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-job>
      <tr>
        <td>{{ job.company }}</td>
        <td>{{ job.title }}</td>
        <td>
          <span class="status-badge status-applied">{{
            job.currentStatus
          }}</span>
        </td>
        <td>
          <button
            pButton
            icon="pi pi-list"
            class="p-button-text p-button-info"
            (click)="openDetails(job.id)"
          ></button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-danger p-button-text"
            (click)="delete(job.id)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
  <p-dialog
    header="Detalhes e Histórico"
    [(visible)]="displayDetailDialog"
    [modal]="true"
    [style]="{ width: '500px' }"
  >
    <app-job-detail [jobId]="selectedJobId"></app-job-detail>
  </p-dialog>
</div>
