<p-confirmDialog></p-confirmDialog>

<div class="list-container">

  <header class="header-container">
    <div class="title-area">
      <h2>Minhas Candidaturas</h2>
      <p class="subtitle">Gerencie e acompanhe seus processos seletivos em tempo real</p>
    </div>
    <button pButton (click)="displayDialog = true" label="Nova Vaga" icon="pi pi-plus" class="add-job-btn"></button>

    <p-dialog
      header="Cadastrar Nova Vaga"
      [(visible)]="displayDialog"
      [modal]="true"
      [style]="{ width: '420px' }"
      styleClass="custom-dialog"
    >
      <app-job-form (jobCreated)="onJobCreated()"></app-job-form>
    </p-dialog>
  </header>


  <section class="filter-bar">
    <div class="filter-group text-search">
      <label for="text">Filtrar:</label>
      <span class="p-input-icon-left search-wrapper">
        <input 
          pInputText 
          type="text" 
          [(ngModel)]="searchTerm" 
          (input)="applyFilters()" 
          placeholder="empresa ou cargo..." />
      </span>
    </div>

    <div class="filter-group status-search">
      <p-dropdown 
        [options]="statusOrder" 
        [(ngModel)]="selectedStatus" 
        (onChange)="applyFilters()" 
        placeholder="Todos os status"
        styleClass="modern-dropdown">
      </p-dropdown>
    </div>

    <div class="filter-group action-search">
      <button 
        pButton 
        label="Limpar" 
        icon="pi pi-filter-slash" 
        class="p-button-outlined p-button-secondary clear-btn"
        (click)="clearFilters()">
      </button>
    </div>
  </section>

  <main class="table-card">
    <p-table [value]="filteredJobs" [tableStyle]="{ 'min-width': '50rem' }" styleClass="p-datatable-striped-custom">
      <ng-template pTemplate="header">
        <tr>
          <th>Empresa</th>
          <th>Título do Cargo</th>
          <th>Status Atual</th>
          <th class="text-right" style="width: 15%">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-job>
        <tr>
          <td class="company-cell">{{ job.company }}</td>
          <td class="title-cell">{{ job.title }}</td>
          <td>
            <span class="status-badge" [attr.data-status]="job.currentStatus">
              {{ job.currentStatus | replaceUnderscore }}
            </span>
          </td>
          <td>
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-eye"
                class="p-button-rounded p-button-text btn-view"
                pTooltip="Ver Histórico"
                tooltipPosition="top"
                (click)="openDetails(job.id)"
              ></button>
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-rounded p-button-text btn-edit"
                pTooltip="Alterar Status"
                tooltipPosition="top"
                (click)="openUpdate(job.id)"
              ></button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-rounded p-button-text btn-delete"
                pTooltip="Excluir Vaga"
                tooltipPosition="top"
                (click)="delete(job.id)"
              ></button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </main>


  <p-dialog
    header="Detalhes e Histórico"
    [(visible)]="displayDetailDialog"
    [modal]="true"
    [style]="{ width: '550px' }"
    styleClass="custom-dialog"
  >
    <app-job-detail *ngIf="displayDetailDialog" [jobId]="selectedJobId"></app-job-detail>
  </p-dialog>

  <p-dialog
    header="Atualizar Status da Vaga"
    [(visible)]="displayUpdateDialog"
    [modal]="true"
    [style]="{ width: '420px' }"
    styleClass="custom-dialog"
  >
    <app-job-update
      *ngIf="displayUpdateDialog"
      [jobId]="selectedJobId"
      (updateSuccess)="onUpdateSuccess()"
    >
    </app-job-update>
  </p-dialog>
</div>
